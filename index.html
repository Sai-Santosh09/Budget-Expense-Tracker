<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Budget Expense Tracker</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>Budget Trip Expense Tracker</h1>
        </header>
        <main class="container">
            <section class="panel">
                <h2>Set Budget</h2>
                <button id="themeToggle" type="button">Dark Mode</button>
                <label>
                    <input type="number" id="budgetInput" min="0" value="0" />
                </label>
                <button id="setBudgetBtn">Set Budget</button>
            </section>

            <section class="panel">
                <h2>Add Expense</h2>
                <form id="expenseForm">
                    <label>
                        Description:
                        <input type="text" id="expenseDes" placeholder="e.g. Flight Tickets" />
                    </label>
                    <label>
                        Category:
                        <select id="expenseCategory">
                            <option value="" disabled selected>Select a Category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Lodging">Lodging</option>
                            <option value="Activities">Travel Activities</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Essentials">Essentials</option>
                            <option value="Other">Other</option>
                        </select>
                    </label>
                    <label>
                        Amount (₹):
                        <input type="number" id="expenseAmount" min="0" placeholder="e.g. 67" />
                    </label>
                    <label>
                        Date:
                        <input type="date" id="expenseDate" />
                    </label>
                    <button type="submit">Add Expense</button>
                </form>
            </section>

            <section class="panel">
                <h2>Budget Summary</h2>
                <p><strong>Total Spent:</strong> ₹<span id="totalSpent">0</span></p>
                <p><strong>Remaining:</strong> ₹<span id="remainingBudget">0</span></p>
            </section>

            <section class="panel">
                <h2>Category Breakdown</h2>
                <div id="categoryBreakdown">No expenses yet...</div>
            </section>
            <label for="sortOption">Sort Expenses</label>
            <select id="sortOption">
                <option value="default">Default</option>
                <option value="amount-high">Amount: High to Low</option>
                <option value="amount-low">Amount: Low to High</option>
                <option value="date-new">Date: Newest First</option>
                <option value="date-old">Date: Oldest First</option>
                <option value="name-az">Description: A to Z</option>
            </select>
            <section class="panel">
                <h2>Expense List</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Amount (₹)</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList">
                        
                    </tbody>
                </table>
            </section>

            <section class="panel">
                <h2>Data Options</h2>
                <button id="saveBtn">Save to Local Storage</button>
                <button id="loadBtn">Load from Local Storage</button>
                <button id="exportBtn">Export JSON</button>
                <input type="file" id="importInput" accept=".json" />
            </section>
        </main>

        <footer>
            <p>&copy; Budget Trip Tracker</p>
        </footer>
        <script src="main.js"></script>
    </body>
</html>
